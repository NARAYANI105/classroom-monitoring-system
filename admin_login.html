<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#2980b9,#6dd5fa,#ffffff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:220px;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#2c7be5;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1a5edb;
}

</style>

<script>

function login(){

var id=document.getElementById("adminid").value;
var pass=document.getElementById("password").value;

if(id=="admin" && pass=="1234")
{
alert("Login Successful");
window.location="dashboard.html";
}
else
{
alert("Invalid Admin ID or Password");
}

}

</script>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="text" id="adminid" placeholder="Admin ID"><br>

<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<br><br>

<a href="index.html">Back</a>

</div>

</body>
</html>
