<!DOCTYPE html>
<html>
<head>
<title>Classroom Monitoring System</title>

<style>
body{
font-family: Arial;
background: linear-gradient(to right,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
width:300px;
}

input,select{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid gray;
}

button{
background:#007BFF;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>

<script>

function loginUser(){

var role=document.getElementById("role").value;
var id=document.getElementById("id").value;
var password=document.getElementById("password").value;

if(id=="" || password==""){
alert("Enter ID and Password");
return;
}

/* simple login check */

if(role=="student" && id=="student" && password=="123"){
window.location.href="floors.html";
}

else if(role=="staff" && id=="staff" && password=="123"){
window.location.href="floors.html";
}

else if(role=="admin" && id=="admin" && password=="123"){
window.location.href="floors.html";
}

else{
alert("Invalid Login");
}

}

</script>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<select id="role">
<option value="student">Student</option>
<option value="staff">Staff</option>
<option value="admin">Admin</option>
</select>

<input type="text" id="id" placeholder="Enter ID">

<input type="password" id="password" placeholder="Enter Password">

<br><br>

<button onclick="loginUser()">Sign In</button>

</div>

</body>
</html>
<script src="script.js"></script>
<button onclick="login()">Sign In</button>
<select id="role">
<option value="student">Student</option>
<option value="staff">Staff</option>
<option value="admin">Admin</option>
</select>

<input type="text" id="id" placeholder="Enter ID">

<input type="password" id="password" placeholder="Enter Password">
