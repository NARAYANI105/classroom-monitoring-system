<!DOCTYPE html>
<html>
<head>
<title>AI Classroom Monitoring</title>

<link rel="stylesheet" href="style.css">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Orbitron:wght@500&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<h1 class="title"><i class="fa-solid fa-robot"></i> AI Classroom Monitoring</h1>

<div class="container">

<div class="room">
<img src="https://images.unsplash.com/photo-1588072432836-e10032774350" alt="classroom">
<h2><i class="fa-solid fa-chalkboard"></i> Room 101</h2>
<p><i class="fa-solid fa-users"></i> Students: 32</p>
<span class="status active"><i class="fa-solid fa-circle-check"></i> Active</span>
</div>

<div class="room">
<img src="https://images.unsplash.com/photo-1580587771525-78b9dba3b914" alt="classroom">
<h2><i class="fa-solid fa-chalkboard"></i> Room 102</h2>
<p><i class="fa-solid fa-users"></i> Students: 0</p>
<span class="status empty"><i class="fa-solid fa-circle-xmark"></i> Empty</span>
</div>

<div class="room">
<img src="https://images.unsplash.com/photo-1577896851231-70ef18881754" alt="classroom">
<h2><i class="fa-solid fa-chalkboard"></i> Room 103</h2>
<p><i class="fa-solid fa-users"></i> Students: 28</p>
<span class="status active"><i class="fa-solid fa-circle-check"></i> Active</span>
</div>

</div>

</body>
</html>
